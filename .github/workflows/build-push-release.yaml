name: Build, Scan, and Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,suffix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Containerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Save image tags as artifact
        run: |
          mkdir -p /tmp/artifacts
          echo '${{ steps.meta.outputs.tags }}' | jq -R . | jq -sc . > /tmp/artifacts/tags.json
      - uses: actions/upload-artifact@v4
        with:
          name: image-tags-${{ matrix.service }}
          path: /tmp/artifacts/tags.json

  security-scan:
    name: Security Scan (${{ matrix.service }})
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Download image tags
        uses: actions/download-artifact@v4
        with:
          name: image-tags-${{ matrix.service }}
          path: /tmp

      - name: Read tags
        id: image
        run: echo "tags=$(cat /tmp/tags.json)" >> $GITHUB_OUTPUT

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ fromJson(steps.image.outputs.tags)[0] }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom.spdx.json

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJson(steps.image.outputs.tags)[0] }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-${{ matrix.service }}

      - name: Run Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ fromJson(steps.image.outputs.tags)[0] }}
          only-severities: critical,high
          exit-code: false
          sarif-file: scout-results.sarif

      - name: Upload Docker Scout results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'scout-results.sarif'
          category: docker-scout-${{ matrix.service }}

  release:
    name: Create GitHub Release
    needs: [build, security-scan]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package source code
        run: zip -r source-code.zip . -x ".git/*" ".github/*" "node_modules/*" ".venv/*" ".ruff_cache/*" ".githooks/*" ".instruct/*" ".mcps/*" ".obsidian/*" "tools/*" ".mcp.json" "CLAUDE.md"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'source-code.zip'
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
